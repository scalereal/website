<section class="bg-neutral">
  <div class="container">
    <div class="row justify-content-md-center">
      <div class="col-md-8">
        <header class="heading content-center">
          <div class="section-chip-light">
            <div class="icon-medal"></div>
            <span>Credibility</span>
          </div>
          <h2 class="section-title">
            Trusted & <span class="text-blue">Recognized</span>
          </h2>
          <p class="section-subtitle section-info">
            What our team says about us matters more than what we say ourselves,
            and our reviews reflect that.
          </p>
        </header>
      </div>
    </div>

    <!-- Reviews -->
    <div class="row justify-content-center">
      <div class="col-lg-10 col-xl-9">
        <div class="row plain-card-wrapper justify-content-center">
          <!-- Card -->
          <!-- Glassdoor Card -->
          <div class="col-lg-4 col-md-6 mb-4">
            <div class="rating-card">
              <div class="rating-stars">
                <span class="star filled-green">★</span>
                <span class="star filled-green">★</span>
                <span class="star filled-green">★</span>
                <span class="star filled-green">★</span>
                <span class="star partial-green">★</span>
              </div>
              <div class="rating-score">
                <span class="score filled-green">4.7</span>
                <span class="max-score">/5.0</span>
              </div>
              <div class="rating-logo">
                <img src="/images/logo/glassdoor.svg" alt="Glassdoor" />
              </div>
            </div>
          </div>

          <!-- Google Reviews Card -->
          <div class="col-lg-4 col-md-6 mb-4">
            <div class="rating-card">
              <div class="rating-stars">
                <span class="star filled-yellow">★</span>
                <span class="star filled-yellow">★</span>
                <span class="star filled-yellow">★</span>
                <span class="star filled-yellow">★</span>
                <span class="star filled-yellow">★</span>
              </div>
              <div class="rating-score">
                <span class="score filled-yellow">5.0</span>
                <span class="max-score">/5.0</span>
              </div>
              <div class="rating-logo">
                <img src="/images/logo/google.svg" alt="Google Reviews" />
              </div>
            </div>
          </div>

          <!-- Clutch Reviews Card -->
          <div class="col-lg-4 col-md-6 mb-4">
            <div class="rating-card">
              <div class="rating-stars">
                <span class="star filled-orange">★</span>
                <span class="star filled-orange">★</span>
                <span class="star filled-orange">★</span>
                <span class="star filled-orange">★</span>
                <span class="star filled-orange">★</span>
              </div>
              <div class="rating-score">
                <span class="score filled-orange">5.0</span>
                <span class="max-score">/5.0</span>
              </div>
              <div class="rating-logo">
                <img src="/images/logo/clutch.png" alt="Clutch Reviews" />
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
