<section id="contact-form" class="section-contact bg-neutral">
  <div class="container">
    <div class="row contact-us-wrapper">
      <!-- INFO -->
      <div class="col-lg-5">
        <h2 class="section-contact-title">Contact Information</h2>

        <div class="contact-card">
          <div class="icon-box">
            <i class="fa-solid fa-envelope"></i>
          </div>
          <div class="contact-content">
            <span class="section-contact-label">Email</span>
            <p>atul@scalereal.com</p>
          </div>
        </div>

        <div class="contact-card">
          <div class="icon-box">
            <i class="fa-solid fa-phone"></i>
          </div>
          <div class="contact-content">
            <span class="section-contact-label">Phone</span>
            <p>+91-9890546018</p>
          </div>
        </div>

        <div class="contact-card">
          <div class="icon-box">
            <i class="fa-solid fa-location-dot"></i>
          </div>
          <div class="contact-content">
            <span class="section-contact-label">Location</span>
            <p>Remote-First • Global Team</p>
          </div>
        </div>

        <div class="contact-card">
          <div class="icon-box">
            <i class="fa-solid fa-clock"></i>
          </div>
          <div class="contact-content">
            <span class="section-contact-label">Response Time</span>
            <p>Within 24 hours</p>
          </div>
        </div>

        <div class="quick-chat">
          <h3>Prefer a Quick Chat?</h3>
          <p>
            Schedule a 30-minute discovery call to discuss your project
            requirements.
          </p>
          <a href="#" class="sr-btn secondary">Schedule a Call</a>
        </div>
      </div>

      <!-- FORM -->
      <div class="col-lg-5">
        <h2 class="section-contact-title">Send Us a Message</h2>
        <div class="contact-form">
          <form id="contactForm">
            <div class="row row-cols-1">
              <div class="col form-group">
                <label for="username" class="text-light-grey"
                  >Your Name <span class="text-red">*</span></label
                >
                <input
                  type="text"
                  id="username"
                  name="username"
                  class="form-control"
                  placeholder="John Doe"
                />
                <span class="input-error" id="usernameError"></span>
              </div>
              <div class="col form-group">
                <label for="email" class="text-light-grey"
                  >Email Address <span class="text-red">*</span></label
                >
                <input
                  type="email"
                  id="email"
                  name="email"
                  class="form-control"
                  placeholder="john@company.com"
                />
                <span class="input-error" id="emailError"></span>
              </div>
            </div>
            <div class="form-group">
              <label for="subject" class="text-light-grey">Company Name</label>
              <input
                type="text"
                id="subject"
                name="subject"
                class="form-control"
                placeholder="Your company"
              />
              <span class="input-error" id="subjectError"></span>
            </div>
            <div class="form-group">
              <label for="message" class="text-light-grey"
                >Project Details <span class="text-red">*</span></label
              >
              <textarea
                name="message"
                class="form-control"
                id="message"
                rows="5"
                placeholder="Tell us about your project, requirements, timeline..."
              ></textarea>
              <span class="input-error" id="messageError"></span>
            </div>
            <button type="submit" id="sendButton">
              <a class="sr-btn primary text-white">Send Message → </a>
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>

<script>
  function showToast(message, type = "success") {
    const toast = document.getElementById("toast");
    toast.textContent = message;
    toast.className = "show " + type;

    setTimeout(() => {
      toast.className = toast.className.replace("show", "").trim();
    }, 3000);
  }

  function validations(name, value) {
    switch (name) {
      case "username":
        if (value === "") {
          return "Please enter your name.";
        } else {
          return "";
        }

      case "email":
        if (value === "") {
          return "Please enter an email.";
        } else if (
          !value.match(
            /^(([^<>()[\]\\.,;:\s@"]+(\.[^<>()[\]\\.,;:\s@"]+)*)|(".+"))@((\[[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\])|(([a-zA-Z\-0-9]+\.)+[a-zA-Z]{2,}))$/g,
          )
        ) {
          return "Please enter a valid email.";
        } else {
          return "";
        }

      //   case "subject":
      //     if (value === "") {
      //       return "Please enter a subject.";
      //     } else if (value.length <= 3) {
      //       return "The length of subject should be more than 3 characters.";
      //     } else {
      //       return "";
      //     }

      case "message":
        if (value === "") {
          return "Please enter details.";
        } else if (value.length <= 3) {
          return "The length of message should be more than 3 characters.";
        } else {
          return "";
        }

      default:
        return "";
    }
  }

  const contactForm = document.getElementById("contactForm");
  const username = document.getElementById("username"),
    usernameError = document.getElementById("usernameError");
  const email = document.getElementById("email"),
    emailError = document.getElementById("emailError");
  const subject = document.getElementById("subject"),
    subjectError = document.getElementById("subjectError");
  const message = document.getElementById("message"),
    messageError = document.getElementById("messageError");

  username.addEventListener("input", () => {
    usernameError.innerText = validations("username", username.value);
  });

  email.addEventListener("input", () => {
    emailError.innerText = validations("email", email.value);
  });

  subject.addEventListener("input", () => {
    subjectError.innerText = validations("subject", subject.value);
  });

  message.addEventListener("input", () => {
    messageError.innerText = validations("message", message.value);
  });

  const sendButton = document.getElementById("sendButton");
  const sendButtonText = document.getElementById("sendButtonText");
  const sendButtonIcon = document.getElementById("sendButtonIcon");
  const sendButtonLoader = document.getElementById("sendButtonLoader");
  contactForm.addEventListener("submit", async (e) => {
    e.preventDefault();

    const usernameErrorText = validations("username", username.value);
    const emailErrorText = validations("email", email.value);
    const subjectErrorText = validations("subject", subject.value);
    const messageErrorText = validations("message", message.value);

    usernameError.innerText = usernameErrorText;
    emailError.innerText = emailErrorText;
    subjectError.innerText = subjectErrorText;
    messageError.innerText = messageErrorText;

    if (
      usernameErrorText === "" &&
      emailErrorText === "" &&
      subjectErrorText === "" &&
      messageErrorText === ""
    ) {
      try {
        sendButton.disabled = true;
        sendButtonText.textContent = "Sending...";
        sendButtonIcon.classList.add("d-none");
        sendButtonLoader.classList.remove("d-none");

        // TODO: add name into the payload and change subject to company name
        const payload = {
          email: email.value,
          subject: subject.value,
          requirement: message.value,
        };

        const res = await fetch("/.netlify/functions/contact-to-crm", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(payload),
        });

        const data = await res.json();
        if (res.ok) {
          showToast("Message sent successfully!", "success");
          contactForm.reset();
          await fetch(`/.netlify/functions/notify-email`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
        } else {
          showToast("Error: " + (data.error || res.statusText), "error");
        }
      } catch (error) {
        console.error("Error sending to CRM:", error);
        showToast("Error: ❌ Something went wrong.", "error");
      } finally {
        sendButton.disabled = false;
        sendButtonText.textContent = "Send";
        sendButtonIcon.classList.remove("d-none");
        sendButtonLoader.classList.add("d-none");
      }
    }
  });
</script>
