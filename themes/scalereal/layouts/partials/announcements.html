{{ $announcements := site.Data.announcements }}

{{ if $announcements }}
<div class="announcement-wrapper">
  {{ range $announcements }}
  <div class="announcement-bar">
    
    <div class="announcement-left">
      <i class="{{ .icon }} announcement-icon"></i>
      <p class="announcement-text">
        {{ .text }}
      </p>
    </div>

    <div class="announcement-right">
      <a href="{{ .link }}" class="announcement-link">
        {{ .link_text }}
        <i data-lucide="arrow-up-right" class="external-arrow"></i>
      </a>

      <button class="announcement-close"
        onclick="this.closest('.announcement-bar').style.display='none'">
        ✕
      </button>
    </div>

  </div>
  {{ end }}
</div>
{{ end }}
