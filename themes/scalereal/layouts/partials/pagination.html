<!-- Pagination -->
<ul class="actions pagination">
    {{ if .Paginator.HasPrev }}
    <a href="{{ .Paginator.Prev.URL }}#all-blogs" class="sr-btn secondary py-2 px-3"> <i class="icon-arrow-left"></i> Previous </a>
    {{ end }}
    &nbsp;&nbsp;&nbsp;
    {{ if .Paginator.HasNext }}
    <a href="{{ .Paginator.Next.URL }}#all-blogs" class="sr-btn secondary py-2 px-3"> Next <i class="icon-arrow-right"></i> </a>
   {{ end }}
</ul>
